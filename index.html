<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JESS... Maafin Aku Yahh? 🐾💕</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars-container" id="starsContainer"></div>
    
    <div class="container">
        <div class="cat-container">
            <div class="cat" id="cat">
                <div class="cat-head">
                    <div class="cat-ears">
                        <div class="ear left-ear"></div>
                        <div class="ear right-ear"></div>
                    </div>
                    <div class="cat-face">
                        <div class="eyes-container">
                            <div class="eye left-eye" id="leftEye"></div>
                            <div class="eye right-eye" id="rightEye"></div>
                        </div>
                        <div class="nose"></div>
                        <div class="whiskers">
                            <div class="whisker"></div>
                            <div class="whisker"></div>
                            <div class="whisker"></div>
                        </div>
                        <div class="mouth" id="catMouth"></div>
                    </div>
                </div>
                <div class="cat-body">
                    <div class="paws">
                        <div class="paw front-left"></div>
                        <div class="paw front-right"></div>
                    </div>
                    <div class="tail" id="tail"></div>
                </div>
                <div class="bubble" id="speechBubble">
                    <span>Meow... maafin dong JESS🥺</span>
                </div>
            </div>
        </div>

        <div class="content">
            <h1 class="main-title">
                <span class="title-word">Pwiss</span><br>
                <span class="title-word">Maafin</span><br>
                <span class="title-word">Aku</span><br>
                <span class="title-word">Yaaa</span> 🐱💕
            </h1>
            
            <div class="reasons">
                <div class="reason-card">
                    <span class="emoji">😭</span>
                    <p>Aku kangen banget sama kamu</p>
                </div>
                <div class="reason-card">
                    <span class="emoji">🛵</span>
                    <p>Mau jalan-jalan with u!</p>
                </div>
                <div class="reason-card">
                    <span class="emoji">🍧</span>
                    <p>ku beliin eskrim!🥰</p>
                </div>
                <div class="reason-card">
                    <span class="emoji">🤗</span>
                    <p>Peluk erat-erat deh!</p>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn forgive-btn" id="forgiveBtn">
                    <span>✅ MAU MAFIN!</span>
                    <div class="btn-glow"></div>
                </button>
                <button class="btn tease-btn" id="teaseBtn">
                    <span>😏 Belum dulu deh</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Success Screen -->
    <div class="success-screen" id="successScreen">
        <div class="success-content">
            <div class="happy-cat" id="happyCat"></div>
            <h2 class="success-title">YIPPPIIIEE! 🎉</h2>
            <p class="success-text">Kamu terbaik deh! Love u unlimitt 💕🐾</p>
            <div class="gifts">
                <span>🎁</span><span>🌹</span><span>🍫</span><span>💐</span>
            </div>
            <button class="restart-btn" id="restartBtn">Main Lagi yuk! 😻</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
